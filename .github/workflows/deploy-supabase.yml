# ============================================================
# Opus8 Platform — Supabase Migration Pipeline
# Runs database migrations on push to main
# ============================================================

name: Deploy Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - 'web-app/supabase/migrations/**'
      - '.github/workflows/deploy-supabase.yml'

jobs:
  migrate:
    name: Apply Migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push Database Migrations
        run: |
          supabase db push

      - name: Verify Schema
        run: |
          echo "✅ Supabase migrations applied successfully."
          echo "📊 Tables: profiles, api_keys, pending_payments, token_usage_log"
