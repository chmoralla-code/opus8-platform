# ============================================================
# Opus8 Platform — Desktop App Build Pipeline
# Builds Tauri desktop app for Windows, macOS, Linux
# ============================================================

name: Build Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'desktop-app/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: opus8-setup.exe
            rust-target: x86_64-pc-windows-msvc

          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: opus8-setup.dmg
            rust-target: x86_64-apple-darwin

          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: opus8-setup.AppImage
            rust-target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: desktop-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop-app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop-app
          tagName: v__VERSION__
          releaseName: 'Opus8 v__VERSION__'
          releaseBody: |
            ## Opus8 Desktop v__VERSION__

            AI-powered coding platform with Claude Opus 8.

            ### What's New
            - Claude Opus 8 Pro & Flash model support
            - Silent vision routing for image uploads
            - Agentic shell for Claude CLI & Ruflo swarms
            - Dynamic Pay-As-You-Go usage bar
            - GCash payment integration

            ### Download
            - Windows: opus8-setup.exe
            - macOS: opus8-setup.dmg
            - Linux: opus8-setup.AppImage

          releaseDraft: false
          prerelease: false

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opus8-${{ runner.os }}
          path: desktop-app/src-tauri/target/release/bundle/**/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            opus8-Windows/**/*
            opus8-macOS/**/*
            opus8-Linux/**/*
          name: 'Opus8 Desktop — Latest Build'
          tag_name: v1.0.${{ github.run_number }}
          body: |
            ## 🚀 Opus8 Desktop App

            Cross-platform AI coding platform powered by Claude Opus 8.

            - **Windows**: `opus8-setup.exe`
            - **macOS**: `opus8-setup.dmg`
            - **Linux**: `opus8-setup.AppImage`

            Built from commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
